name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Chrome extension
        - Mobile app
        - Web app
        - Scanner signaling API
        - Scanner protocol
        - Documentation
        - Unsure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Extension version, app build, or commit SHA if known.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: text
