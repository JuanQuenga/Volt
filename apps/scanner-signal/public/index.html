<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scout Scanner Pairing</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b0d10;
        color: #f4f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(29, 185, 84, 0.18), transparent 34rem),
          linear-gradient(135deg, #0b0d10 0%, #141820 100%);
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      h1, h2, p {
        margin: 0;
      }

      h1 {
        font-size: clamp(1.5rem, 4vw, 2.4rem);
        letter-spacing: 0;
      }

      h2 {
        font-size: 1rem;
        margin-bottom: 12px;
      }

      .muted {
        color: #9aa4b2;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #2a3341;
        border-radius: 999px;
        padding: 8px 12px;
        background: rgba(13, 17, 23, 0.72);
        white-space: nowrap;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #f59e0b;
      }

      .dot.connected {
        background: #22c55e;
      }

      .dot.error {
        background: #ef4444;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(320px, 0.9fr) minmax(360px, 1.1fr);
        gap: 16px;
      }

      section {
        border: 1px solid #243041;
        border-radius: 8px;
        background: rgba(13, 17, 23, 0.88);
        padding: 16px;
      }

      .qr-wrap {
        display: grid;
        place-items: center;
        min-height: 316px;
        border-radius: 8px;
        background: #fff;
        padding: 16px;
      }

      .qr-wrap img {
        max-width: 100%;
        height: auto;
      }

      .actions, .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .actions {
        margin-top: 12px;
      }

      button, label.file-button {
        appearance: none;
        border: 1px solid #344154;
        border-radius: 7px;
        background: #18202b;
        color: #f4f7fb;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 10px 12px;
      }

      button.primary {
        background: #22c55e;
        border-color: #22c55e;
        color: #041208;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.52;
      }

      input, textarea {
        width: 100%;
        border: 1px solid #344154;
        border-radius: 7px;
        background: #090c10;
        color: #f4f7fb;
        font: inherit;
        padding: 10px 12px;
      }

      textarea {
        min-height: 88px;
        resize: vertical;
      }

      video {
        width: 100%;
        max-height: 420px;
        border-radius: 8px;
        background: #05070a;
        object-fit: cover;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .log {
        height: 260px;
        overflow: auto;
        border: 1px solid #263244;
        border-radius: 8px;
        background: #06080b;
        padding: 10px;
        font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: pre-wrap;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 820px) {
        header, .grid {
          display: grid;
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Scout Scanner Pairing</h1>
          <p class="muted">Use the mobile app, this browser camera, manual text, or an uploaded barcode image.</p>
        </div>
        <div class="status"><span id="statusDot" class="dot"></span><span id="statusText">Starting</span></div>
      </header>

      <div class="grid">
        <section class="stack">
          <div>
            <h2>Pairing QR</h2>
            <p class="muted">Scan with the Volt app, or open the app link from this device.</p>
          </div>
          <div class="qr-wrap"><img id="qr" alt="Volt app pairing QR code" /></div>
          <div class="actions">
            <button id="openApp" class="primary">Open Volt App</button>
            <button id="copyApp">Copy App Link</button>
            <button id="copyPage">Copy Page Link</button>
          </div>
          <input id="sessionInput" placeholder="Session id" />
        </section>

        <section class="stack">
          <div>
            <h2>Browser Scanner</h2>
            <p class="muted">After the data channel opens, scans and debug payloads are sent to the paired extension.</p>
          </div>
          <video id="video" playsinline muted></video>
          <div class="actions">
            <button id="startCamera" class="primary">Start Camera</button>
            <button id="stopCamera">Stop Camera</button>
            <label class="file-button" for="upload">Upload Image</label>
            <input id="upload" class="hidden" type="file" accept="image/*" />
          </div>
          <div class="row">
            <input id="manualValue" placeholder="Manual barcode or debug text" />
            <button id="sendManual">Send</button>
            <button id="sendTest">Send Test</button>
          </div>
        </section>
      </div>

      <section class="stack" style="margin-top: 16px">
        <div class="row">
          <button id="checkSignal">Check Signal</button>
          <button id="copyState">Copy Debug State</button>
          <button id="clearLog">Clear Log</button>
        </div>
        <div id="log" class="log"></div>
      </section>
    </main>

    <script>
      const SIGNAL_URL = "/api/signal";
      const ICE_SERVERS = [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" },
      ];

      const params = new URLSearchParams(location.search);
      const sessionId = params.get("session") || "";
      const offerCode = params.get("offer") || "";
      const appLink =
        params.get("app") ||
        (sessionId
          ? `volt://pair?session=${encodeURIComponent(sessionId)}${offerCode ? `&offer=${encodeURIComponent(offerCode)}` : ""}`
          : "");
      const state = {
        sessionId,
        offerCode,
        appLink,
        status: "starting",
        lastSent: null,
        scansSent: 0,
        logs: [],
      };

      const $ = (id) => document.getElementById(id);
      const logEl = $("log");
      const statusText = $("statusText");
      const statusDot = $("statusDot");
      const sessionInput = $("sessionInput");
      const video = $("video");
      let pc = null;
      let channel = null;
      let stream = null;
      let detector = null;
      let scanTimer = null;
      let lastBarcode = { value: "", at: 0 };

      sessionInput.value = sessionId;

      function log(message, data) {
        const line = `[${new Date().toISOString()}] ${message}${data ? ` ${JSON.stringify(data)}` : ""}`;
        state.logs.push(line);
        logEl.textContent = state.logs.slice(-240).join("\n");
        logEl.scrollTop = logEl.scrollHeight;
      }

      function setStatus(status) {
        state.status = status;
        statusText.textContent = status;
        statusDot.className = `dot ${status === "connected" ? "connected" : status.includes("error") ? "error" : ""}`;
      }

      function decodePairingPayload(payload) {
        const normalized = payload.replace(/-/g, "+").replace(/_/g, "/");
        const padded = normalized.padEnd(normalized.length + ((4 - normalized.length % 4) % 4), "=");
        return JSON.parse(atob(padded));
      }

      function sendValue(value, format = "manual", kind = "barcode") {
        const barcode = value.trim();
        if (!barcode) return;
        if (!channel || channel.readyState !== "open") {
          log("send blocked: data channel is not open", { readyState: channel?.readyState || "missing" });
          return;
        }
        const payload = { barcode, format, kind, scannedAt: new Date().toISOString() };
        channel.send(JSON.stringify(payload));
        state.lastSent = payload;
        state.scansSent += 1;
        log("sent payload", payload);
        navigator.vibrate?.(80);
      }

      function drawQr() {
        if (!appLink) {
          log("missing session; open this page with ?session=<id>");
          setStatus("missing session");
          return;
        }
        $("qr").src = `https://api.qrserver.com/v1/create-qr-code/?size=288x288&margin=12&ecc=H&data=${encodeURIComponent(appLink)}`;
      }

      async function initPairing() {
        if (!sessionId) return;
        setStatus("fetching offer");
        try {
          let offerDescription = offerCode ? decodePairingPayload(offerCode) : null;

          if (!offerDescription) {
            const offerResponse = await fetch(`${SIGNAL_URL}/${encodeURIComponent(sessionId)}`);
            log("GET offer", { status: offerResponse.status });
            if (!offerResponse.ok) throw new Error(`Offer fetch failed: ${offerResponse.status}`);
            const { offer } = await offerResponse.json();
            if (!offer) throw new Error("Offer response did not include an offer");
            offerDescription = JSON.parse(offer);
          } else {
            log("using embedded offer fallback");
          }

          pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
          pc.onconnectionstatechange = () => {
            log("peer connection state", { state: pc.connectionState });
            if (pc.connectionState === "failed") setStatus("connection error");
            if (pc.connectionState === "disconnected" || pc.connectionState === "closed") setStatus("disconnected");
          };
          pc.oniceconnectionstatechange = () => log("ice state", { state: pc.iceConnectionState });
          pc.ondatachannel = (event) => {
            channel = event.channel;
            log("data channel received", { label: channel.label });
            channel.onopen = () => {
              log("data channel open");
              setStatus("connected");
            };
            channel.onclose = () => {
              log("data channel closed");
              setStatus("disconnected");
            };
            channel.onerror = () => {
              log("data channel error");
              setStatus("connection error");
            };
          };

          await pc.setRemoteDescription(offerDescription);
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          await new Promise((resolve) => {
            const timeout = setTimeout(resolve, 5000);
            pc.onicecandidate = (event) => {
              if (!event.candidate) {
                clearTimeout(timeout);
                resolve();
              }
            };
          });

          const answerResponse = await fetch(`${SIGNAL_URL}/${encodeURIComponent(sessionId)}/answer`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ answer: JSON.stringify(pc.localDescription) }),
          });
          log("POST answer", { status: answerResponse.status });
          if (!answerResponse.ok) throw new Error(`Answer post failed: ${answerResponse.status}`);
          setStatus("waiting for channel");
        } catch (error) {
          log("pairing error", { message: error.message });
          setStatus("connection error");
        }
      }

      async function startCamera() {
        if (!("BarcodeDetector" in window)) {
          log("BarcodeDetector is not available in this browser; use image upload or manual send");
          return;
        }
        detector = new BarcodeDetector();
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        video.srcObject = stream;
        await video.play();
        log("camera started");
        scanTimer = window.setInterval(async () => {
          try {
            const codes = await detector.detect(video);
            const code = codes[0];
            if (!code?.rawValue) return;
            const now = Date.now();
            if (lastBarcode.value === code.rawValue && now - lastBarcode.at < 1200) return;
            lastBarcode = { value: code.rawValue, at: now };
            sendValue(code.rawValue, code.format || "camera");
          } catch (error) {
            log("camera decode error", { message: error.message });
          }
        }, 350);
      }

      function stopCamera() {
        if (scanTimer) window.clearInterval(scanTimer);
        scanTimer = null;
        stream?.getTracks().forEach((track) => track.stop());
        stream = null;
        video.srcObject = null;
        log("camera stopped");
      }

      async function decodeUpload(file) {
        if (!file) return;
        if (!("BarcodeDetector" in window)) {
          log("BarcodeDetector is not available for uploads in this browser");
          return;
        }
        const bitmap = await createImageBitmap(file);
        const localDetector = detector || new BarcodeDetector();
        const codes = await localDetector.detect(bitmap);
        log("upload decoded", { count: codes.length, file: file.name });
        codes.forEach((code) => sendValue(code.rawValue, code.format || "upload"));
      }

      $("openApp").onclick = () => {
        if (appLink) location.href = appLink;
      };
      $("copyApp").onclick = () => navigator.clipboard.writeText(appLink);
      $("copyPage").onclick = () => navigator.clipboard.writeText(location.href);
      $("startCamera").onclick = () => startCamera().catch((error) => log("camera start error", { message: error.message }));
      $("stopCamera").onclick = stopCamera;
      $("sendManual").onclick = () => sendValue($("manualValue").value, "manual", "text");
      $("sendTest").onclick = () => sendValue(`SCOUT-TEST-${Date.now()}`, "debug", "text");
      $("upload").onchange = (event) => decodeUpload(event.target.files?.[0]).catch((error) => log("upload error", { message: error.message }));
      $("checkSignal").onclick = async () => {
        const id = sessionInput.value.trim();
        const response = id ? await fetch(`${SIGNAL_URL}/${encodeURIComponent(id)}`) : await fetch(SIGNAL_URL);
        log("signal check", { status: response.status, ok: response.ok, id: id || null });
      };
      $("copyState").onclick = () => navigator.clipboard.writeText(JSON.stringify({
        sessionId: state.sessionId,
        status: state.status,
        scansSent: state.scansSent,
        lastSent: state.lastSent,
        peerConnectionState: pc?.connectionState || null,
        iceConnectionState: pc?.iceConnectionState || null,
        dataChannelState: channel?.readyState || null,
        userAgent: navigator.userAgent,
      }, null, 2));
      $("clearLog").onclick = () => {
        state.logs = [];
        logEl.textContent = "";
      };

      window.addEventListener("beforeunload", () => {
        stopCamera();
        channel?.close();
        pc?.close();
      });

      drawQr();
      initPairing();
    </script>
  </body>
</html>
